name: Android CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check sensitive files
        run: ./scripts/check_sensitive_files.sh

      - name: Prepare CI Firebase config
        run: cp app/google-services.example.json app/google-services.json

      - name: Build debug and run unit tests
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest

      - name: Build release artifact
        run: ./gradlew :app:assembleRelease :app:bundleRelease
